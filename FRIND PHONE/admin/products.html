<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการสินค้า - FP Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-rocket"></i> FP Admin
        </div>
        <ul class="sidebar-nav">
            <li><a href="index.html"><i class="fas fa-home"></i> แดชบอร์ด</a></li>
            <li><a href="products.html" class="active"><i class="fas fa-box"></i> จัดการสินค้า</a></li>
            <li><a href="orders.html"><i class="fas fa-shopping-cart"></i> คำสั่งซื้อ</a></li>
            <li><a href="customers.html"><i class="fas fa-users"></i> ลูกค้า</a></li>
            <li><a href="settings.html"><i class="fas fa-cog"></i> ตั้งค่า</a></li>
        </ul>
        <div class="sidebar-bottom">
            <a href="../index.html"><i class="fas fa-external-link-alt"></i> กลับสู่หน้าร้าน</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-search">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="ค้นหา...">
            </div>
            <div class="topbar-user">
                <span>Admin User</span>
                <i class="fas fa-user-circle"></i>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="section-card">
                <div class="section-header">
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <h2>จัดการสินค้าทั้งหมด</h2>
                        <select id="admin-category-filter" class="form-control" style="width: auto; padding: 6px 12px; font-size: 14px; border-radius: 4px;">
                            <option value="all">ทุกหมวดหมู่</option>
                            <option value="notebook">โน้ตบุ๊ค</option>

                            <option value="hardware">ฮาร์ดแวร์</option>
                            <option value="monitor">จอคอมพิวเตอร์</option>
                            <option value="gaming">เกมมิ่งเกียร์</option>
                            <option value="phone">มือถือ</option>
                            <option value="printer">เครื่องพิมพ์</option>
                            <option value="network">เน็ตเวิร์ค</option>
                            <option value="audio">เครื่องเสียง</option>
                            <option value="apple">Apple</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="openProductModal()"><i class="fas fa-plus"></i>
                        เพิ่มสินค้าใหม่</button>
                </div>

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th width="80">รูปภาพ</th>
                            <th>รหัส</th>
                            <th>ชื่อสินค้า</th>
                            <th>หมวดหมู่</th>
                            <th>ราคา</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-tbody">
                        <!-- JS injected -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Product Modal -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">เพิ่มสินค้าใหม่</h2>
                <button class="close-modal" onclick="closeProductModal()">&times;</button>
            </div>
            <form id="product-form">
                <input type="hidden" id="p-id">
                <div class="form-group">
                    <label>ชื่อสินค้า</label>
                    <input type="text" id="p-name" class="form-control" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>หมวดหมู่</label>
                        <select id="p-category" class="form-control" required>
                            <option value="notebook">โน้ตบุ๊ค</option>

                            <option value="hardware">ฮาร์ดแวร์</option>
                            <option value="monitor">จอคอมพิวเตอร์</option>
                            <option value="gaming">เกมมิ่งเกียร์</option>
                            <option value="phone">มือถือ</option>
                            <option value="printer">เครื่องพิมพ์</option>
                            <option value="network">เน็ตเวิร์ค</option>
                            <option value="audio">เครื่องเสียง</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>แบรนด์</label>
                        <input type="text" id="p-brand" class="form-control" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>ราคาปกติ</label>
                        <input type="number" id="p-original-price" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>ราคาขาย</label>
                        <input type="number" id="p-price" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>URL รูปภาพ</label>
                    <input type="url" id="p-image" class="form-control" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label>สเปค (ย่อ)</label>
                    <input type="text" id="p-specs" class="form-control" placeholder="CPU / GPU / RAM / SSD" required>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-edit" onclick="closeProductModal()">ยกเลิก</button>
                    <button type="submit" class="btn btn-primary">บันทึกสินค้า</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
